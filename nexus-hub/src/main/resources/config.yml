nexus:
  redis:
    host: "127.0.0.1"
    port: 6379
    password: ""
    pool-size: 10

  provisioner:
    server-name-prefix: "minion-"
    template-directory: "/servers/templates"
    working-directory: "/servers/minions"
    startup-command: "java -Xms{ramMb}M -Xmx{ramMb}M -jar paper.jar nogui"

  turrets:
    - id: "turret-nl-1"
      host: "10.0.0.1"
      max-minions: 20
      total-ram-mb: 16384
      api-key: "ptlc_changeme"
      tags: [ "all" ]

  turret-selector:
    strategy: LEAST_LOADED   # LEAST_LOADED | ROUND_ROBIN | RANDOM
    tag-affinity:
      default: "all"

  matchmaking:
    tick-interval-ms: 2000
    queue-timeout-seconds: 120
    fill-strategy: FILL_THEN_START   # FILL_THEN_START | TIMED_START
    timed-start:
      wait-seconds: 30
      min-players-override: 4

  minion:
    max-concurrent-total: 100
    boot-timeout-seconds: 45
    heartbeat-timeout-seconds: 30

  hub:
    return-server: "hub"
    managed-games: []   # empty = manage ALL registered games; example: ["revenant"]

  map-pools:
    default:
      rotation: RANDOM
      maps: []
